services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: empty_nyc_carriage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d empty_nyc_carriage"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
